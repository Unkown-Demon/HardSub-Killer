<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hardsub-Killer OCR</title>
    <script>
      // Suppress Vite WebSocket connection errors and unhandled rejections
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (event.reason.message && event.reason.message.includes('WebSocket') || event.reason.toString().includes('WebSocket'))) {
          event.preventDefault();
        }
      });
      const originalConsoleError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && (args[0].includes('[vite] failed to connect') || args[0].includes('WebSocket'))) {
          return;
        }
        originalConsoleError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
